name: Release images

# Build and push the backend and web images to ghcr.io/mikekonan/cograph-* on
# every v* tag or manual dispatch. The Helm chart in helm/cograph/ is pinned
# to these image tags from the deploying-side values.yaml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: .
            dockerfile: backend/Dockerfile
            repository: ghcr.io/mikekonan/cograph-backend
          - name: web
            context: ./web
            dockerfile: Dockerfile
            repository: ghcr.io/mikekonan/cograph-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Fine-grained PATs don't support GHCR write for personal
          # namespaces, so RELEASE_PAT is a classic PAT with `repo` +
          # `write:packages`. The default GITHUB_TOKEN gets denied with
          # `write_package` even though `permissions: packages: write`
          # is set on this workflow — using the user PAT bypasses that.
          username: mikekonan
          password: ${{ secrets.RELEASE_PAT }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
