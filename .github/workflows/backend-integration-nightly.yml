name: Backend Integration Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./backend[dev]

      - name: Run integration suite
        env:
          COGRAPH_RUN_INTEGRATION: "1"
          COGRAPH_INTEGRATION_ADMIN_DSN: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: >-
          python -m pytest
          backend/integration_tests/test_core_infra.py
          backend/integration_tests/test_graph_api.py
          backend/integration_tests/test_retrieval_api.py
          -q
