name: pgw CI

# This workflow ONLY exists on the `pgw-main` branch on pgw.dev/ai/cograph.
# It is intentionally absent from `main` on github.com/mikekonan/cograph
# so the public mirror has zero references to the internal pipeline.
#
# Sync model: pgw-main = main + this commit. Rebase pgw-main onto main
# before pushing — see scripts/sync-pgw.sh (local-only, not tracked).

on:
  push:
    branches:
      - pgw-main
  pull_request:
    branches:
      - pgw-main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: pgw-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: [prod]
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./backend[dev]

      - name: Create CI databases
        run: |
          python - <<'PY'
          import asyncio
          import asyncpg

          async def main() -> None:
              conn = await asyncpg.connect("postgresql://postgres:postgres@127.0.0.1:5432/postgres")
              try:
                  for db in ("cograph_ci", "cograph_test"):
                      await conn.execute(f'DROP DATABASE IF EXISTS "{db}"')
                      await conn.execute(f'CREATE DATABASE "{db}"')
              finally:
                  await conn.close()

          asyncio.run(main())
          PY

      - name: Ruff
        run: ruff check backend/app backend/tests backend/integration_tests

      - name: Pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/cograph_test
        run: python -m pytest backend/tests -q

      - name: Alembic upgrade smoke
        env:
          COGRAPH_DATABASE__URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/cograph_ci
        run: alembic -c backend/alembic.ini upgrade head

  frontend:
    name: Frontend
    runs-on: [prod]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  images:
    name: ${{ matrix.image.name }} image
    runs-on: [prod]
    timeout-minutes: 35
    needs:
      - backend
      - frontend
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: .
            dockerfile: backend/Dockerfile
            suffix: cograph-backend
          - name: web
            context: ./web
            dockerfile: Dockerfile
            suffix: cograph-web
    env:
      HARBOR_REGISTRY: harbor.pgw.dev
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.HARBOR_REGISTRY }}/ai/${{ matrix.image.suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pgw-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=pgw-${{ matrix.image.name }}
