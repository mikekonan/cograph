# Cograph MCP eval question set v1
#
# Each question targets a category of agent behaviour we want to measure.
# The question is asked verbatim. The agent (Claude) must answer using
# only the Cograph MCP server — no filesystem grep, no web search.
#
# Fields:
#   id                       Stable slug; used as the JSONL record id.
#   category                 Bucket for category-level aggregation.
#   question                 Verbatim user turn.
#   expected_answer_keywords List of strings that should appear in the answer
#                            (case-insensitive). Used for the deterministic
#                            correctness scorer in score.py:
#                              - all present  -> "correct"
#                              - >=50% present -> "partial"
#                              - <50% present -> "incorrect"
#   expected_provenance      List of citation patterns (file_path/wiki_slug
#                            substrings). Answer must mention at least one
#                            for the cites_provenance check to pass.
#   max_tool_calls_target    Soft target for H1; the harness records actual
#                            count regardless and the comparator uses median.
#   negative                 If true, the "correct" answer is a graceful
#                            "I don't have enough information". Catches H5
#                            (truncation) and H6 (silent fallback).
#
# Repos assumed indexed in the test instance:
#   - github.com/mikekonan/cograph              (this repo)
#   - github.com/samber/lo                      (small Go lib)
#   - github.com/samber/mo                      (small Go lib)
#   - github.com/mikekonan/go-oas3              (Go codegen)
#
# Plus one md_collection: "cograph-design-notes" (a small set of curated
# md docs uploaded for the eval — see eval/README.md for setup).

questions:
  # --- Category: repo_overview (6 questions) ---
  - id: repo-overview-cograph
    category: repo_overview
    question: "What is the cograph project about? Keep the answer to 3 sentences."
    expected_answer_keywords: ["self-hosted", "git repos", "RAG", "MCP"]
    expected_provenance: ["README.md", "wiki/overview"]
    max_tool_calls_target: 1
    negative: false

  - id: repo-overview-samber-lo
