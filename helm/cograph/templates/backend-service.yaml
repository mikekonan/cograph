apiVersion: v1
kind: Service
metadata:
  name: {{ include "cograph.backendServiceName" . }}
  labels:
    {{- include "cograph.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "cograph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http

