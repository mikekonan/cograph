{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cograph.secretName" . }}
  labels:
    {{- include "cograph.labels" . | nindent 4 }}
type: Opaque
stringData:
  COGRAPH_DATABASE__URL: {{ .Values.secrets.databaseUrl | quote }}
  COGRAPH_REDIS__URL: {{ .Values.secrets.redisUrl | quote }}
  COGRAPH_AUTH__JWT_SECRET: {{ .Values.secrets.authJwtSecret | quote }}
  COGRAPH_EMBEDDING__API_KEY: {{ .Values.secrets.embeddingApiKey | quote }}
  COGRAPH_COMPLETION__API_KEY: {{ .Values.secrets.completionApiKey | quote }}
{{- end }}

