apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrate" (include "cograph.fullname" .) }}
  labels:
    {{- include "cograph.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "cograph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "cograph.backendImage" . }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          command:
            - /bin/sh
            - -lc
            - alembic -c backend/alembic.ini upgrade head
          env:
            {{- include "cograph.commonEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "cograph.secretName" . }}
